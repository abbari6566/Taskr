<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taskr Dashboard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #0f111a;
        color: #d0d0d0;
        min-height: 100vh;
      }
      a {
        color: #82aaff;
        text-decoration: none;
      }
      .container {
        max-width: 1280px;
        margin: 0 auto;
        padding: 24px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 28px;
      }
      header h1 {
        font-size: 1.6rem;
        color: #e4e4e4;
        letter-spacing: 0.5px;
      }
      header .dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #4caf50;
        margin-right: 8px;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      header small {
        color: #777;
        font-size: 0.82rem;
      }

      /* Cards */
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 14px;
        margin-bottom: 28px;
      }
      .card {
        background: #1a1e2e;
        border-radius: 10px;
        padding: 18px 16px;
        text-align: center;
        border: 1px solid #262a3a;
      }
      .card .label {
        font-size: 0.72rem;
        text-transform: uppercase;
        color: #888;
        margin-bottom: 6px;
        letter-spacing: 1px;
      }
      .card .value {
        font-size: 1.8rem;
        font-weight: 700;
        color: #e4e4e4;
      }
      .card.high .value {
        color: #ff5370;
      }
      .card.normal .value {
        color: #82aaff;
      }
      .card.low .value {
        color: #c3e88d;
      }
      .card.processing .value {
        color: #ffcb6b;
      }
      .card.retry .value {
        color: #f78c6c;
      }
      .card.dead .value {
        color: #ff5370;
      }
      .card.done .value {
        color: #4caf50;
      }
      .card.failed .value {
        color: #ff5370;
      }
      .card.pending .value {
        color: #82aaff;
      }
      .card.avg .value {
        font-size: 1.4rem;
        color: #c792ea;
      }

      /* Sections */
      .section {
        margin-bottom: 28px;
      }
      .section h2 {
        font-size: 1.05rem;
        color: #bbb;
        margin-bottom: 12px;
        border-bottom: 1px solid #262a3a;
        padding-bottom: 6px;
      }

      /* Workers */
      .workers {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .worker-badge {
        background: #1a1e2e;
        border: 1px solid #262a3a;
        border-radius: 8px;
        padding: 10px 16px;
        font-size: 0.85rem;
      }
      .worker-badge .pid {
        color: #82aaff;
        font-weight: 600;
      }
      .worker-badge .ttl {
        color: #888;
        margin-left: 8px;
        font-size: 0.75rem;
      }

      /* Table */
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }
      thead th {
        text-align: left;
        padding: 10px 12px;
        background: #1a1e2e;
        color: #999;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.72rem;
        letter-spacing: 0.5px;
        border-bottom: 2px solid #262a3a;
      }
      tbody td {
        padding: 10px 12px;
        border-bottom: 1px solid #1e2233;
      }
      tbody tr:hover {
        background: #1e2233;
      }
      .task-id {
        font-family: monospace;
        font-size: 0.78rem;
        color: #82aaff;
      }

      /* Status badges */
      .badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 12px;
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .badge.pending {
        background: #1e3a5f;
        color: #82aaff;
      }
      .badge.running {
        background: #4a3800;
        color: #ffcb6b;
      }
      .badge.done {
        background: #1b3a1b;
        color: #4caf50;
      }
      .badge.failed {
        background: #3a1b1b;
        color: #ff5370;
      }
      .badge.retrying {
        background: #3a2a1b;
        color: #f78c6c;
      }
      .badge.dead {
        background: #2a1b1b;
        color: #888;
      }

      .empty {
        color: #555;
        text-align: center;
        padding: 32px;
        font-style: italic;
      }

      /* Filters */
      .filters {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
        flex-wrap: wrap;
      }
      .filters button {
        background: #1a1e2e;
        border: 1px solid #262a3a;
        color: #aaa;
        padding: 5px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.78rem;
      }
      .filters button:hover,
      .filters button.active {
        background: #262a3a;
        color: #e4e4e4;
        border-color: #444;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1><span class="dot"></span>Taskr Dashboard</h1>
        <small id="clock"></small>
      </header>

      <!-- Stats row -->
      <div class="cards" id="stats-cards"></div>

      <!-- Queue depths -->
      <div class="section">
        <h2>Queue Depths</h2>
        <div class="cards" id="queue-cards"></div>
      </div>

      <!-- Workers -->
      <div class="section">
        <h2>Active Workers</h2>
        <div class="workers" id="workers"></div>
      </div>

      <!-- Tasks -->
      <div class="section">
        <h2>Recent Tasks</h2>
        <div class="filters" id="filters">
          <button class="active" data-status="">All</button>
          <button data-status="pending">Pending</button>
          <button data-status="running">Running</button>
          <button data-status="done">Done</button>
          <button data-status="failed">Failed</button>
          <button data-status="retrying">Retrying</button>
          <button data-status="dead">Dead</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Task ID</th>
              <th>Function</th>
              <th>Status</th>
              <th>Priority</th>
              <th>Retries</th>
              <th>Created</th>
              <th>Duration</th>
              <th>Worker</th>
            </tr>
          </thead>
          <tbody id="task-body"></tbody>
        </table>
      </div>
    </div>

    <script>
      let statusFilter = "";

      document.getElementById("filters").addEventListener("click", (e) => {
        if (e.target.tagName !== "BUTTON") return;
        document
          .querySelectorAll("#filters button")
          .forEach((b) => b.classList.remove("active"));
        e.target.classList.add("active");
        statusFilter = e.target.dataset.status;
        fetchAll();
      });

      function fmtDuration(started, finished) {
        if (!started || !finished) return "—";
        const ms = new Date(finished) - new Date(started);
        if (ms < 1000) return ms + "ms";
        return (ms / 1000).toFixed(2) + "s";
      }

      function fmtTime(iso) {
        if (!iso) return "—";
        const d = new Date(iso);
        return d.toLocaleTimeString();
      }

      function truncId(id) {
        return id ? id.substring(0, 8) + "…" : "—";
      }

      async function fetchAll() {
        try {
          const [queues, workers, tasks] = await Promise.all([
            fetch("/queues").then((r) => r.json()),
            fetch("/workers").then((r) => r.json()),
            fetch(
              "/tasks?limit=200" +
                (statusFilter ? "&status=" + statusFilter : ""),
            ).then((r) => r.json()),
          ]);

          // Stats
          const done = tasks.filter((t) => t.status === "done").length;
          const failed = tasks.filter(
            (t) => t.status === "failed" || t.status === "dead",
          ).length;
          const pending = tasks.filter((t) => t.status === "pending").length;
          const durations = tasks
            .filter((t) => t.started_at && t.finished_at)
            .map((t) => new Date(t.finished_at) - new Date(t.started_at));
          const avgMs = durations.length
            ? durations.reduce((a, b) => a + b, 0) / durations.length
            : 0;

          document.getElementById("stats-cards").innerHTML = `
      <div class="card done"><div class="label">Completed</div><div class="value">${done}</div></div>
      <div class="card failed"><div class="label">Failed</div><div class="value">${failed}</div></div>
      <div class="card pending"><div class="label">Pending</div><div class="value">${pending}</div></div>
      <div class="card avg"><div class="label">Avg Duration</div><div class="value">${avgMs ? (avgMs / 1000).toFixed(2) + "s" : "—"}</div></div>
    `;

          // Queue depths
          document.getElementById("queue-cards").innerHTML = `
      <div class="card high"><div class="label">High</div><div class="value">${queues.high}</div></div>
      <div class="card normal"><div class="label">Normal</div><div class="value">${queues.normal}</div></div>
      <div class="card low"><div class="label">Low</div><div class="value">${queues.low}</div></div>
      <div class="card processing"><div class="label">Processing</div><div class="value">${queues.processing}</div></div>
      <div class="card retry"><div class="label">Retry</div><div class="value">${queues.retry}</div></div>
      <div class="card dead"><div class="label">Dead</div><div class="value">${queues.dead}</div></div>
    `;

          // Workers
          const wEl = document.getElementById("workers");
          if (workers.length === 0) {
            wEl.innerHTML = '<div class="empty">No active workers</div>';
          } else {
            wEl.innerHTML = workers
              .map(
                (w) =>
                  `<div class="worker-badge"><span class="pid">PID ${w.worker_id}</span><span class="ttl">TTL ${w.ttl}s</span></div>`,
              )
              .join("");
          }

          // Tasks table
          const tbody = document.getElementById("task-body");
          if (tasks.length === 0) {
            tbody.innerHTML =
              '<tr><td colspan="8" class="empty">No tasks found</td></tr>';
          } else {
            tbody.innerHTML = tasks
              .map(
                (t) => `
        <tr>
          <td class="task-id" title="${t.task_id || ""}">${truncId(t.task_id)}</td>
          <td>${t.function || "—"}</td>
          <td><span class="badge ${t.status}">${t.status}</span></td>
          <td>${t.priority || "—"}</td>
          <td>${t.retries || 0}/${t.max_retries || 3}</td>
          <td>${fmtTime(t.created_at)}</td>
          <td>${fmtDuration(t.started_at, t.finished_at)}</td>
          <td>${t.worker_id ? "PID " + t.worker_id : "—"}</td>
        </tr>
      `,
              )
              .join("");
          }

          document.getElementById("clock").textContent =
            "Updated " + new Date().toLocaleTimeString();
        } catch (err) {
          console.error("Dashboard fetch error:", err);
        }
      }

      fetchAll();
      setInterval(fetchAll, 3000);
    </script>
  </body>
</html>
